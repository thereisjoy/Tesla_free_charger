name: Check is-a.dev PR Status

on:
  schedule:
    # 매시간 자동 실행 (UTC 기준, 한국 시간 +9시간)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  check-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR #33834 Status
        id: check_pr
        run: |
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/is-a-dev/register/pulls/33834")

          STATE=$(echo $RESPONSE | jq -r '.state')
          MERGED=$(echo $RESPONSE | jq -r '.merged')

          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "merged=$MERGED" >> $GITHUB_OUTPUT

          echo "PR State: $STATE"
          echo "PR Merged: $MERGED"

      - name: Send Telegram Notification - Approved ✅
        if: steps.check_pr.outputs.state == 'closed' && steps.check_pr.outputs.merged == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ tesla-destination.is-a.dev 승인 완료!%0A%0A이제 https://tesla-destination.is-a.dev 로 접속할 수 있습니다.%0A(HTTPS 인증서 적용까지 최대 24시간 소요될 수 있음)%0A%0A🎉 PR 링크: https://github.com/is-a-dev/register/pull/33834" \
            -d "parse_mode=HTML"

      - name: Send Telegram Notification - Rejected ❌
        if: steps.check_pr.outputs.state == 'closed' && steps.check_pr.outputs.merged == 'false'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ PR #33834 거절됨%0A%0Atesla-destination.is-a.dev 신청이 거절됐습니다.%0AGITHUB에서 사유를 확인해주세요:%0Ahttps://github.com/is-a-dev/register/pull/33834" \
            -d "parse_mode=HTML"

      - name: Disable Workflow on Success
        if: steps.check_pr.outputs.state == 'closed'
        run: |
          echo "PR가 승인/거절되었습니다. 이 워크플로우는 더 이상 실행되지 않습니다."
          echo "필요시 GitHub Workflows 설정에서 수동으로 비활성화할 수 있습니다."

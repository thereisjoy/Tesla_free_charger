<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla 충전소</title>

<meta name="twitter:title"       content="Tesla 충전소">
<meta name="twitter:description" content="전국 254개 Tesla 충전소(데스티네이션+슈퍼차저) 위치 안내 및 카카오·네이버 내비게이션 바로 연결">
<meta name="twitter:image"       content="https://thereisjoy.github.io/Tesla_free_charger/og-image.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
    border-bottom: 1px solid #e31937;
    padding: 24px 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .tesla-logo { width: 32px; height: 32px; flex-shrink: 0; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  header .subtitle { color: #666; font-size: 13px; margin-top: 3px; }
  .header-count { background: #e31937; color: #fff; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 700; }

  /* ── 컨트롤 영역 ── */
  .controls {
    background: #111;
    padding: 16px 40px;
    border-bottom: 1px solid #222;
    position: sticky; top: 0; z-index: 100;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* 검색창 래퍼 */
  .search-wrapper {
    position: relative; display: flex; align-items: center; gap: 8px;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #555; pointer-events: none; font-size: 15px;
  }
  .search-box {
    flex: 1;
    background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 10px;
    padding: 11px 100px 11px 40px; color: #e5e5e5; font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box:focus { border-color: #e31937; box-shadow: 0 0 0 3px rgba(227,25,55,0.1); }
  .search-box::placeholder { color: #444; }

  .search-actions { position: absolute; right: 12px; display: flex; align-items: center; gap: 6px; }
  .clear-btn {
    background: #2a2a2a; border: none; color: #888; cursor: pointer;
    border-radius: 50%; width: 22px; height: 22px; font-size: 13px;
    display: none; align-items: center; justify-content: center;
    transition: background 0.15s; line-height: 1;
  }
  .clear-btn:hover { background: #e31937; color: #fff; }
  .kbd-hint { color: #444; font-size: 11px; background: #1e1e1e; border: 1px solid #333; border-radius: 4px; padding: 2px 5px; }

  /* 필터 행 */
  .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-label { color: #555; font-size: 12px; white-space: nowrap; }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .filter-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px;
    padding: 6px 13px; color: #777; font-size: 12px; cursor: pointer;
    transition: all 0.18s; white-space: nowrap; display: flex; align-items: center; gap: 5px;
  }
  .filter-btn:hover { border-color: #e31937; color: #fff; }
  .filter-btn.active { background: #e31937; border-color: #e31937; color: #fff; font-weight: 600; }
  .filter-btn .cnt {
    background: rgba(255,255,255,0.15); border-radius: 10px;
    padding: 1px 6px; font-size: 11px; line-height: 1.4;
  }
  .filter-btn.active .cnt { background: rgba(0,0,0,0.25); }

  /* 정렬 + 부가필터 */
  .extra-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .sort-label {
    color: #555; font-size: 12px; flex-shrink: 0;
    writing-mode: vertical-rl; text-orientation: mixed;
    letter-spacing: 2px; text-align: center;
  }
  .sort-group { display: flex; gap: 6px; }
  .sort-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 5px 11px; color: #666; font-size: 12px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; gap: 4px;
  }
  .sort-btn:hover { color: #ccc; border-color: #444; }
  .sort-btn.active { border-color: #555; color: #ccc; background: #222; }
  .sort-arrow { font-size: 10px; }

  .tag-filter { display: flex; gap: 6px; margin-left: auto; }
  .tag-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 5px 11px; color: #666; font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .tag-btn:hover { border-color: #555; color: #bbb; }
  .tag-btn.active { background: #1d2e1a; border-color: #4caf50; color: #4caf50; }

  /* 자동완성 드롭다운 */
  .autocomplete-box {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
    z-index: 200; overflow: hidden; display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .ac-item {
    padding: 10px 16px; font-size: 13px; color: #ccc; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #222; transition: background 0.1s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.focused { background: #222; }
  .ac-item .ac-icon { color: #555; font-size: 12px; width: 16px; text-align: center; }
  .ac-item .ac-region { color: #555; font-size: 11px; margin-left: auto; padding-left: 8px; }
  .ac-item mark { background: none; color: #e31937; font-weight: 600; }
  .ac-section-header { padding: 6px 16px; font-size: 11px; color: #444; background: #151515; letter-spacing: 0.5px; }

  /* 통계 바 */
  .stats-bar {
    padding: 10px 40px;
    background: #0e0e0e; border-bottom: 1px solid #181818;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .stats-bar .stat { font-size: 13px; color: #555; }
  .stats-bar .stat strong { color: #e31937; }
  .stats-bar .stat-divider { width: 1px; height: 14px; background: #2a2a2a; }

  /* ── TOP 5 인기 충전소 ── */
  .top5-section {
    padding: 20px 40px 0;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
  }
  .top5-live-bar {
    grid-column: 1/-1; display: flex; align-items: center; gap: 8px;
    padding: 0 2px 4px;
  }
  .top5-live-dot {
    width: 8px; height: 8px; background: #22c55e; border-radius: 50%; flex-shrink: 0;
    animation: pulse-live 2s infinite;
  }
  @keyframes pulse-live {
    0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(34,197,94,.5); }
    50% { opacity:.7; box-shadow:0 0 0 5px rgba(34,197,94,0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .top5-live-txt { font-size: 12px; color: #444; }
  .top5-live-time { font-size: 11px; color: #333; margin-left: auto; }
  .top5-refresh-btn {
    background: none; border: 1px solid #222; color: #555;
    border-radius: 6px; padding: 2px 9px; font-size: 14px;
    cursor: pointer; transition: all .2s; line-height: 1.4;
  }
  .top5-refresh-btn:hover { border-color: #e31937; color: #e31937; }
  .top5-refresh-btn.spinning { animation: spin .8s linear infinite; }
  .top5-card {
    background: #111; border: 1px solid #1e1e1e; border-radius: 12px;
    padding: 16px 18px; transition: border-color 0.2s;
  }
  .top5-card:hover { border-color: #333; }
  .top5-header {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 13px; font-weight: 700; color: #e5e5e5; margin-bottom: 12px;
  }
  .top5-badge {
    background: #e31937; color: #fff; border-radius: 10px;
    padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  }
  .top5-badge.weekly { background: #2563eb; }
  .top5-hint { font-size: 10px; color: #333; margin-left: auto; font-weight: 400; }
  .top5-list { display: flex; flex-direction: column; gap: 6px; }
  .top5-empty { color: #444; font-size: 13px; text-align: center; padding: 16px 0; }
  .top5-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; background: #0e0e0e;
    transition: background 0.15s; cursor: default;
  }
  .top5-item:hover { background: #1a1a1a; }
  .top5-item.clickable { cursor: pointer; }
  .top5-item.clickable:hover { background: #14141e; }
  .top5-item.clickable:hover .top5-name { color: #e31937; }
  .top5-rank {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .top5-rank.r1 { background: linear-gradient(135deg,#ffd700,#ffb300); color: #000; }
  .top5-rank.r2 { background: linear-gradient(135deg,#c0c0c0,#a0a0a0); color: #000; }
  .top5-rank.r3 { background: linear-gradient(135deg,#cd7f32,#a0622e); color: #fff; }
  .top5-rank.r4, .top5-rank.r5 { background: #222; color: #888; }
  .top5-name { flex: 1; font-size: 13px; color: #ddd; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .15s; }
  .top5-count { font-size: 12px; color: #e31937; font-weight: 700; flex-shrink: 0; }
  .top5-bar-wrap { width: 50px; height: 4px; background: #1a1a1a; border-radius: 2px; flex-shrink: 0; overflow: hidden; }
  .top5-bar { height: 100%; background: #e31937; border-radius: 2px; transition: width 0.5s ease; }
  .top5-card.weekly-card .top5-bar { background: #2563eb; }
  .top5-card.weekly-card .top5-count { color: #3b82f6; }

  /* 테이블 */
  .table-wrap { padding: 20px 40px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 680px; }
  thead tr { background: #141414; }
  th {
    padding: 11px 14px; text-align: left; font-size: 12px;
    color: #555; font-weight: 600; letter-spacing: 0.5px;
    border-bottom: 2px solid #e31937; user-select: none;
    cursor: pointer; white-space: nowrap;
  }
  th:hover { color: #aaa; }
  th .th-inner { display: flex; align-items: center; gap: 5px; }
  th .sort-ind { font-size: 10px; color: #e31937; }

  tbody tr {
    border-bottom: 1px solid #161616;
    transition: background 0.12s;
    cursor: default;
  }
  tbody tr:hover { background: #141414; }
  td { padding: 13px 14px; font-size: 14px; vertical-align: top; }

  .row-num { color: #444; font-size: 12px; }
  .name { font-weight: 600; color: #fff; line-height: 1.4; }
  .name mark { background: rgba(227,25,55,0.2); color: #ff6b7a; border-radius: 2px; padding: 0 1px; }
  .name-link { color: #fff; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.25); text-underline-offset: 3px; transition: color 0.15s, text-decoration-color 0.15s; }
  .name-link:hover { color: #e31937; text-decoration-color: #e31937; }

  /* 충전소 유형 배지 */
  .type-badge {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; white-space: nowrap;
  }
  .type-badge.dest { background: rgba(76,175,80,0.15); color: #4caf50; border: 1px solid rgba(76,175,80,0.25); }
  .type-badge.sc { background: rgba(227,25,55,0.15); color: #e31937; border: 1px solid rgba(227,25,55,0.25); }

  /* 충전기/요금 셀 스타일 */
  .stalls-cell { text-align: center; font-size: 13px; color: #ccc; }
  .stalls-num { font-weight: 700; font-size: 15px; color: #fff; }
  .stalls-kw { font-size: 11px; color: #777; display: block; margin-top: 1px; }
  /* 모바일 충전기 배지 — 데스크탑에서는 숨김 */
  .stalls-badge { display: none; }
  .price-cell { font-size: 12px; line-height: 1.6; }
  .price-tesla { color: #e31937; font-weight: 600; }
  .price-other { color: #888; }
  .price-label { font-size: 10px; color: #555; margin-right: 2px; }

  .region-badge {
    display: inline-block;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 4px; padding: 2px 8px;
    font-size: 12px; color: #888; white-space: nowrap; cursor: pointer;
    transition: all 0.15s;
  }
  .region-badge:hover { border-color: #e31937; color: #e31937; }

  .address { color: #aaa; line-height: 1.5; }
  .address mark { background: rgba(227,25,55,0.15); color: #ff8c96; border-radius: 2px; padding: 0 1px; }
  .address .detail { color: #666; font-size: 12px; margin-top: 3px; }
  .phone-link { color: #6ba3e8; font-size: 13px; text-decoration: none; white-space: nowrap; }
  .phone-link:hover { color: #90bcf5; text-decoration: underline; }
  .no-data { color: #333; font-size: 13px; }

  /* 지도 버튼 */
  .map-btns { display: flex; flex-direction: column; gap: 5px; }
  .map-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 6px; font-size: 12px;
    text-decoration: none; white-space: nowrap; font-weight: 500;
    transition: opacity 0.15s, transform 0.12s;
    border: none; cursor: pointer;
  }
  .map-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .map-btn.naver { background: #03C75A; color: #fff; }
  .map-btn.kakao { background: #FEE500; color: #3A1D1D; }
  .map-btn img { width: 14px; height: 14px; border-radius: 2px; }


  .no-results {
    text-align: center; padding: 60px 20px; color: #444; font-size: 15px; display: none;
  }
  .no-results svg { display: block; margin: 0 auto 16px; }
  .no-results .suggest { margin-top: 10px; font-size: 13px; color: #555; }

  /* 맨 위로 버튼 */
  .scroll-top {
    position: fixed; bottom: 30px; right: 30px;
    background: #e31937; color: #fff; border: none; border-radius: 50%;
    width: 44px; height: 44px; font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(227,25,55,0.4);
    transition: opacity 0.2s, transform 0.2s;
    opacity: 0; pointer-events: none; display: flex; align-items: center; justify-content: center;
  }
  .scroll-top.show { opacity: 1; pointer-events: all; }
  .scroll-top:hover { transform: translateY(-2px); }

  /* ── 탭 바 ── */
  .tab-bar {
    background: #111;
    border-bottom: 2px solid #1a1a1a;
    padding: 0 40px;
    display: flex; gap: 0;
  }
  .tab-btn {
    background: none; border: none;
    padding: 14px 20px;
    color: #666; font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .tab-btn:hover { color: #ccc; }
  .tab-btn.active { color: #fff; border-bottom-color: #e31937; }
  .tab-btn .tab-cnt {
    background: #1e1e1e; border-radius: 12px;
    padding: 2px 8px; font-size: 11px; color: #666;
  }
  .tab-btn.active .tab-cnt { background: rgba(227,25,55,0.2); color: #e31937; }

  /* ─── 모바일 지역 섹션 (데스크톱 숨김) ── */
  .mob-region-section { display: none; }

  .mob-region-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .mob-region-toggle {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 5px 11px; color: #666; font-size: 12px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, color 0.15s;
  }
  .mob-region-toggle.has-sel { border-color: #555; color: #ccc; background: #222; }
  .mob-region-arrow { font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .mob-region-toggle.open .mob-region-arrow { transform: rotate(180deg); }

  /* 선택된 지역 칩 */
  .mob-selected-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .mob-chip {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(227,25,55,0.15); border: 1px solid rgba(227,25,55,0.5);
    border-radius: 14px; padding: 4px 10px;
    font-size: 12px; color: #ff8a96; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .mob-chip-x { font-size: 13px; color: #e31937; line-height: 1; }

  /* 확장 패널 */
  .mob-region-expand { display: none; padding-top: 10px; }
  .mob-region-expand.open { display: block; }
  .mob-region-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
  }
  .mob-region-grid .filter-btn {
    justify-content: center; text-align: center;
    padding: 8px 2px; font-size: 11px; border-radius: 7px;
    flex-direction: column; gap: 1px; min-height: 40px;
    -webkit-tap-highlight-color: transparent;
  }
  .mob-region-grid .filter-btn .cnt { font-size: 9px; }

  /* ─── 모바일 반응형 ─────────────────────────────────── */
  /* ─── 모바일 반응형 (iPhone 17 / max-width:768px) ──────── */
  @media (max-width: 768px) {

    /* ── 헤더 ── */
    header {
      padding: 10px 16px 10px max(16px, env(safe-area-inset-left));
      gap: 10px;
      position: sticky; top: 0; z-index: 110;
    }
    .header-left { gap: 10px; }
    .tesla-logo { width: 24px; height: 24px; }
    header h1 { font-size: 15px; }
    header .subtitle { font-size: 10px; }
    .header-count { font-size: 11px; padding: 3px 9px; }

    /* ── 탭 바 ── */
    .tab-bar { padding: 0 16px; }
    .tab-btn { padding: 11px 14px; font-size: 13px; }

    /* ── 검색 / 컨트롤 ── */
    .controls {
      padding: 10px 16px;
      gap: 8px;
      top: 47px;           /* sticky: 헤더 아래 */
    }
    .search-box { padding: 10px 44px 10px 36px; font-size: 15px; }
    .kbd-hint { display: none; }

    /* 데스크톱 필터 숨기고 모바일 지역 섹션 표시 */
    .filter-row { display: none; }
    .mob-region-section { display: block; }
    .region-dd-wrap { display: none !important; }
    .extra-row {
      flex-wrap: nowrap; overflow-x: auto;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .extra-row::-webkit-scrollbar { display: none; }
    .sort-group, .tag-filter { flex-shrink: 0; }
    .tag-filter { margin-left: 0; }

    /* 통계 바 */
    .stats-bar { padding: 8px 16px; gap: 8px; }
    .stats-bar .stat { font-size: 11px; }

    /* ─── 테이블 → 카드 레이아웃 ─────────────────────── */
    .table-wrap { padding: 10px 12px calc(32px + env(safe-area-inset-bottom)); overflow-x: visible; }
    table { min-width: unset; width: 100%; }
    table, tbody { display: block; }
    thead { display: none; }

    tbody tr {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "td-name   td-region"
        "td-addr   td-addr"
        "td-map    td-map";
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      margin-bottom: 9px;
      padding: 13px 14px;
      gap: 4px 8px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }
    tbody tr:active { background: #171717; }

    td { padding: 0; border: none; vertical-align: top; }

    /* ── 클래스 기반 grid-area 배치 (nth-child 대신) ── */
    td.row-num                          { display: none; }
    td:has(.name)                       { grid-area: td-name;   min-width: 0; }
    td:has(.region-badge)               { grid-area: td-region; align-self: start; padding-top: 2px; }
    td.address                          { grid-area: td-addr; }
    td:has(.map-btns)                   { grid-area: td-map; }

    /* ── 텍스트 스타일 ── */
    .name          { font-size: 15px; font-weight: 700; line-height: 1.3; display: flex; flex-wrap: wrap; align-items: center; gap: 5px; }
    .name-link     { color: inherit; text-decoration: none; }
    .name-link:active { opacity: 0.7; }

    /* ── 충전기 배지 (이름 옆에 인라인 표시) ── */
    .stalls-badge {
      display: inline-flex; align-items: center;
      background: #e31937; color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
      letter-spacing: 0.3px; white-space: nowrap;
      flex-shrink: 0;
    }

    .address       { font-size: 12px; color: #888; line-height: 1.5; margin-top: 2px; }
    .detail        { font-size: 11px; color: #666; margin-top: 1px; }

    /* ── 충전기/전화번호 칸 — 모바일에서 숨김 (배지로 대체) ── */
    td.stalls-cell, td.phone-cell { display: none !important; }

    /* ── 전화번호 ── */
    .phone-link { font-size: 12px; }
    .no-data    { display: none; }

    /* ── 가격 (슈퍼차저) ── */
    .price-cell    { font-size: 11px; line-height: 1.5; text-align: right; }
    .price-tesla   { font-size: 15px; font-weight: 700; }
    .price-other   { font-size: 11px; }

    /* ── 지도 버튼 ── */
    .map-btns { flex-direction: row; gap: 8px; margin-top: 6px; }
    .map-btn  {
      flex: 1; justify-content: center;
      padding: 10px 8px; font-size: 12px;
      border-radius: 8px; min-height: 44px;   /* Apple HIG 최소 터치 영역 */
      touch-action: manipulation;
    }

    /* ── 기타 ── */
    .no-results  { padding: 40px 16px; }
    .scroll-top  {
      bottom: calc(20px + env(safe-area-inset-bottom));
      right: max(16px, env(safe-area-inset-right));
    }
  }
  /* ── 전화번호 필터 숨김 ── */
  #hasPhoneBtn { display: none !important; }

  /* ══════════════════════════════════════
     UX/UI 개선 추가 스타일
  ══════════════════════════════════════ */

  /* ── 페이드-인 애니메이션 ── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-row { animation: fadeSlideIn 0.18s ease forwards; }

  /* ── 뷰 토글 버튼 ── */
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 5px 9px; color: #555; font-size: 12px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; gap: 5px;
    white-space: nowrap; -webkit-tap-highlight-color: transparent;
  }
  .view-btn:hover { border-color: #444; color: #bbb; }
  .view-btn.active { background: #1e1e1e; border-color: #e31937; color: #fff; }

  /* ── 그리드 카드 뷰 컨테이너 ── */
  .card-grid-wrap {
    padding: 16px 40px 40px;
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  /* ── 스테이션 카드 ── */
  .station-card {
    background: #111; border: 1px solid #1e1e1e;
    border-radius: 14px; padding: 16px;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    cursor: default;
    animation: fadeSlideIn 0.2s ease forwards;
    opacity: 0;
  }
  .station-card:hover {
    border-color: #2c2c2c;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }
  .card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; margin-bottom: 8px;
  }
  .card-name { font-weight: 700; font-size: 14px; color: #fff; line-height: 1.35; flex: 1; min-width: 0; }
  .card-name a { color: #fff; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.2); text-underline-offset: 3px; }
  .card-name a:hover { color: #e31937; text-decoration-color: #e31937; }
  .card-addr { color: #888; font-size: 12px; line-height: 1.5; margin-bottom: 10px; }
  .card-addr .detail { color: #555; font-size: 11px; margin-top: 2px; }
  .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .card-stalls-badge {
    display: inline-flex; align-items: center;
    background: rgba(227,25,55,0.12); border: 1px solid rgba(227,25,55,0.25);
    border-radius: 20px; padding: 3px 10px;
    font-size: 11px; color: #ff8a96; font-weight: 600;
  }
  /* ── kW 칩 (카드 & 테이블 공통) ── */
  .kw-chip {
    display: inline-flex; align-items: center;
    border-radius: 20px; padding: 3px 9px;
    font-size: 11px; font-weight: 600;
  }
  .kw-chip.fast, .stalls-kw.fast { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.3); color: #66bb6a; }
  .kw-chip.mid,  .stalls-kw.mid  { background: rgba(255,193,7,0.12);  border: 1px solid rgba(255,193,7,0.3);  color: #ffc107; }
  .kw-chip.slow, .stalls-kw.slow { background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.25); color: #888; }
  /* 기존 .stalls-kw 오버라이드 */
  .stalls-kw.fast { background: none; border: none; color: #66bb6a; }
  .stalls-kw.mid  { background: none; border: none; color: #ffc107; }
  .stalls-kw.slow { background: none; border: none; color: #777; }

  /* ── 카드 액션 버튼 영역 ── */
  .card-actions { display: flex; gap: 6px; }
  .card-actions .map-btn { flex: 1; justify-content: center; padding: 8px 6px; font-size: 12px; }
  .card-copy-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 7px 10px; color: #555; font-size: 13px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .card-copy-btn:hover { border-color: #555; color: #aaa; }

  /* ── 테이블 행 인라인 복사 버튼 ── */
  .addr-copy-wrap { display: flex; align-items: flex-start; gap: 6px; }
  .inline-copy-btn {
    background: none; border: 1px solid transparent; border-radius: 4px;
    color: #333; font-size: 11px; cursor: pointer;
    padding: 1px 5px; opacity: 0; flex-shrink: 0; margin-top: 1px;
    transition: opacity 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  tbody tr:hover .inline-copy-btn { opacity: 1; }
  .inline-copy-btn:hover { border-color: #555; color: #aaa; }

  /* ── 토스트 알림 ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #222; border: 1px solid #333; border-radius: 10px;
    padding: 10px 20px; color: #ddd; font-size: 13px;
    opacity: 0; transition: opacity 0.22s, transform 0.22s;
    pointer-events: none; z-index: 9999; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── body 뷰 모드 클래스 제어 ── */
  body.view-grid  .table-wrap      { display: none !important; }
  body.view-grid  .card-grid-wrap  { display: grid !important; }
  body.view-table .card-grid-wrap  { display: none !important; }

  /* ── 슈퍼차저 요금 칩 (카드) ── */
  .card-price-chip {
    display: inline-flex; align-items: center;
    background: rgba(227,25,55,0.1); border: 1px solid rgba(227,25,55,0.2);
    border-radius: 20px; padding: 3px 9px;
    font-size: 11px; color: #e31937; font-weight: 600;
  }

  @media (max-width: 768px) {
    .view-toggle { display: none; }
    .card-grid-wrap { padding: 10px 12px 40px; grid-template-columns: 1fr; }
    .top5-section { grid-template-columns: 1fr; padding: 12px 16px 0; gap: 10px; }
    .top5-live-bar { grid-column: 1/-1; }
    .top5-card { padding: 12px 14px; }
    .top5-header { font-size: 12px; }
    .top5-item { padding: 6px 8px; }
    .top5-name { font-size: 12px; }
    .top5-live-bar { padding-bottom: 2px; }
    .top5-hint { display: none; }
    .season-slide { padding: 8px 16px; font-size: 12px; flex-wrap: wrap; gap: 6px; }
    .banner-count { display: none; }
    .banner-prev { display: none; }
    .route-panel { padding: 10px 16px; gap: 8px; }
    .route-select { min-width: 90px; font-size: 12px; }
  }

  /* ── 즐겨찾기 버튼 ── */
  .fav-btn {
    background: none; border: none; cursor: pointer; padding: 2px 3px;
    font-size: 14px; line-height: 1; border-radius: 4px; flex-shrink: 0;
    opacity: 0.18; transition: opacity .15s, transform .15s; vertical-align: middle;
  }
  .fav-btn:hover { opacity: 0.6; }
  .fav-btn.active { opacity: 1; filter: drop-shadow(0 0 4px #ffd700); }

  /* ── 최근 검색 ── */
  .recent-box {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 201;
    background: #111; border: 1px solid #222; border-top: none;
    border-radius: 0 0 10px 10px; padding: 10px 14px;
  }
  .recent-label { font-size: 10px; color: #444; margin-bottom: 7px; letter-spacing: .5px; }
  .recent-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .recent-chip {
    background: #161616; border: 1px solid #252525; border-radius: 20px;
    padding: 4px 11px; font-size: 12px; color: #999; cursor: pointer; transition: all .15s;
  }
  .recent-chip:hover { border-color: #e31937; color: #e31937; }
  .recent-clear { margin-left: auto; font-size: 10px; color: #2a2a2a; cursor: pointer; padding: 2px 4px; transition: color .15s; }
  .recent-clear:hover { color: #555; }

  /* ── 계절 배너 ── */
  .season-banner {
    border-bottom: 1px solid #1a1a1a;
    padding: 0; overflow: hidden; position: relative;
    font-size: 13px;
  }
  .season-slide {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 40px;
    transition: opacity .3s ease, transform .3s ease;
  }
  .season-slide.fade-out { opacity: 0; transform: translateX(-12px); pointer-events: none; position: absolute; }
  .season-slide.fade-in  { animation: slideIn .3s ease forwards; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .season-icon { font-size: 17px; flex-shrink: 0; }
  .season-text { color: #7aaa7a; }
  .season-cta {
    font-size: 11px; color: #4e7e4e; cursor: pointer;
    white-space: nowrap; text-decoration: underline; text-underline-offset: 2px;
    transition: color .15s;
  }
  .season-cta:hover { color: #7aaa7a; }
  .banner-nav {
    margin-left: auto; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .banner-dots { display: flex; gap: 4px; align-items: center; }
  .banner-dot {
    width: 5px; height: 5px; border-radius: 50%; background: #2a3a2a;
    cursor: pointer; transition: background .2s, transform .2s;
  }
  .banner-dot.active { background: #5a8a5a; transform: scale(1.3); }
  .banner-next, .banner-prev {
    background: none; border: none; color: #3a5a3a; cursor: pointer;
    font-size: 16px; padding: 0 3px; line-height: 1; transition: color .15s;
  }
  .banner-next:hover, .banner-prev:hover { color: #7aaa7a; }
  .banner-count { font-size: 10px; color: #334433; white-space: nowrap; }
  .season-close {
    background: none; border: none; color: #334433; cursor: pointer;
    font-size: 15px; padding: 0 4px 0 0; line-height: 1; transition: color .15s; flex-shrink: 0;
  }
  .season-close:hover { color: #7aaa7a; }

  /* ── 루트 플래너 ── */
  .route-panel {
    background: #0b0b12; border-bottom: 1px solid #17172a;
    padding: 11px 40px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .route-label { font-size: 13px; color: #555; font-weight: 700; white-space: nowrap; }
  .route-select {
    background: #111; border: 1px solid #222; color: #bbb;
    border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer;
    font-family: inherit; min-width: 108px; transition: border-color .15s;
  }
  .route-select:focus { border-color: #e31937; outline: none; color: #e5e5e5; }
  .route-arrow { color: #444; font-size: 15px; }
  .route-go {
    background: #e31937; color: #fff; border: none; border-radius: 8px;
    padding: 6px 16px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: background .15s;
  }
  .route-go:hover { background: #c01530; }
  .route-reset {
    background: none; border: 1px solid #1e1e1e; color: #444; border-radius: 8px;
    padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .route-reset:hover { border-color: #444; color: #888; }
  .route-info { font-size: 11px; color: #3a3a5a; margin-left: auto; }
  .route-toggle {
    background: none; border: 1px solid #1e1e1e; color: #444;
    border-radius: 8px; padding: 5px 12px; font-size: 12px;
    cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .route-toggle:hover { border-color: #555; color: #888; }
  .route-toggle.active { border-color: #3b3b6b; color: #7b7bab; background: #0e0e1e; }
</style>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
</head>
<body>

<header>
  <div class="header-left">
    <svg class="tesla-logo" viewBox="8 -4 262 262" xmlns="http://www.w3.org/2000/svg" onclick="location.reload()" style="cursor:pointer">
      <g fill="#e82127">
        <path d="M139.35 252.502l35.476-199.519c33.815 0 44.481 3.708 46.021 18.843 0 0 22.684-8.458 34.125-25.636-44.646-20.688-89.505-21.621-89.505-21.621l-26.176 31.882.059-.004-26.176-31.883s-44.86.934-89.5 21.622c11.431 17.178 34.124 25.636 34.124 25.636C59.347 56.686 70 52.978 103.588 52.954l35.762 199.548"/>
        <path d="M139.336 15.36c36.09-.276 77.399 5.583 119.687 24.014 5.652-10.173 7.105-14.669 7.105-14.669C219.901 6.416 176.61.157 139.331 0 102.054.157 58.765 6.417 12.544 24.705c0 0 2.062 5.538 7.1 14.669 42.28-18.431 83.596-24.29 119.687-24.014h.005"/>
      </g>
    </svg>
    <div>
      <h1 onclick="location.reload()" style="cursor:pointer">Tesla 충전소</h1>
      <div class="subtitle" id="headerSubtitle">전국 충전소 통합 안내</div>
    </div>
  </div>
  <div class="header-count" id="headerCount">전체 0개</div>
</header>

<!-- ── 계절 배너 ── -->
<div class="season-banner" id="seasonBanner" style="display:none">
  <div class="season-slide" id="seasonSlide">
    <span class="season-icon" id="bannerIcon"></span>
    <span class="season-text" id="bannerText"></span>
    <span class="season-cta" id="bannerCta"></span>
    <div class="banner-nav">
      <div class="banner-dots" id="bannerDots"></div>
      <button class="banner-prev" id="bannerPrev" title="이전">‹</button>
      <button class="banner-next" id="bannerNext" title="다음">›</button>
      <span class="banner-count" id="bannerCount"></span>
    </div>
    <button class="season-close" id="bannerClose" title="오늘 하루 닫기">✕</button>
  </div>
</div>

<!-- ── 유형 필터 바 ── -->
<div class="tab-bar">
  <button class="tab-btn active" id="tabAll" onclick="switchType('all')">
    전체 <span class="tab-cnt" id="tabAllCnt">254</span>
  </button>
  <button class="tab-btn" id="tabDest" onclick="switchType('dest')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">
      <rect x="9" y="2" width="2.5" height="7" rx="1"/>
      <rect x="12.5" y="2" width="2.5" height="7" rx="1"/>
      <path d="M6 8h12a1 1 0 0 1 1 1v4a5 5 0 0 1-5 5h-1v3a1 1 0 0 1-2 0v-3h-1a5 5 0 0 1-5-5V9a1 1 0 0 1 1-1z"/>
    </svg>
    데스티네이션 <span class="tab-cnt" id="tabDestCnt">79</span>
  </button>
  <button class="tab-btn" id="tabSc" onclick="switchType('sc')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">
      <path d="M13 2L4.5 13.5H11L10 22L19.5 10H13L13 2Z"/>
    </svg>
    슈퍼차저 <span class="tab-cnt" id="tabScCnt">175</span>
  </button>
  <button class="tab-btn" id="tabFav" onclick="switchType('fav')">
    ⭐ 즐겨찾기 <span class="tab-cnt" id="tabFavCnt">0</span>
  </button>
</div>

<div class="controls">
  <!-- 검색창 -->
  <div class="search-wrapper" id="searchWrapper">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-box" id="searchInput"
      placeholder="충전소명, 주소, 지역 검색..."
      autocomplete="off" spellcheck="false">
    <div class="search-actions">
      <button class="clear-btn" id="clearBtn" title="지우기">✕</button>
      <span class="kbd-hint">/</span>
    </div>
    <div class="autocomplete-box" id="acBox"></div>
  </div>

  <!-- 지역 필터 (데스크톱) -->
  <div class="filter-row">
    <span class="filter-label">지역</span>
    <div class="filter-group" id="filterGroup"></div>
  </div>

  <!-- 모바일 전용: 지역 인라인 확장 -->
  <div class="mob-region-section" id="mobRegionSection">
    <div class="mob-region-top">
      <span class="sort-label mob-region-label-txt">지역</span>
      <button class="mob-region-toggle" id="mobRegionToggle">
        <span id="mobRegionLabel">전체</span><span class="mob-region-arrow" id="mobRegionArrow">▾</span>
      </button>
      <div class="mob-selected-chips" id="mobSelectedChips"></div>
    </div>
    <div class="mob-region-expand" id="mobRegionExpand">
      <div class="mob-region-grid" id="mobRegionGrid"></div>
    </div>
  </div>

  <!-- 정렬 + 부가 필터 -->
  <div class="extra-row">
    <span class="sort-label">정렬</span>
    <div class="sort-group">
      <button class="sort-btn active" data-sort="default" title="기본 순서">
        <span>기본</span>
      </button>
      <button class="sort-btn" data-sort="name-asc" title="이름 오름차순">
        <span>이름</span><span class="sort-arrow">↑</span>
      </button>
      <button class="sort-btn" data-sort="name-desc" title="이름 내림차순">
        <span>이름</span><span class="sort-arrow">↓</span>
      </button>
      <button class="sort-btn" data-sort="region" title="지역순">
        <span>지역</span>
      </button>
    </div>
    <div class="tag-filter">
      <button class="tag-btn" id="hasPhoneBtn" title="전화번호 있는 곳만">📞 전화번호 있음</button>
    </div>
    <button class="route-toggle" id="routeToggleBtn" onclick="toggleRoutePlanner()" title="루트 플래너" style="display:none">🗺️ 루트 플래너</button>
    <div class="view-toggle">
      <button class="view-btn active" id="viewTableBtn" title="테이블 보기">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="3" rx="1"/><rect x="3" y="9" width="18" height="3" rx="1"/><rect x="3" y="15" width="18" height="3" rx="1"/><rect x="3" y="21" width="18" height="3" rx="1" opacity=".5"/></svg>
        테이블

const FAV_KEY = 'tsla_favs';
let favs = new Set();
try { JSON.parse(localStorage.getItem(FAV_KEY)||'[]').forEach(k => favs.add(k)); } catch(e){}
const favKey = s => s.name + '|' + s.type;

function toggleFav(name, type) {
  const k = name + '|' + type;
  favs.has(k) ? favs.delete(k) : favs.add(k);
  try { localStorage.setItem(FAV_KEY, JSON.stringify([...favs])); } catch(e){}
  document.querySelectorAll(`.fav-btn[data-fk]`).forEach(b => {
    if (b.dataset.fk === k) b.classList.toggle('active', favs.has(k));
  });
  updateFavTab();
}
function updateFavTab() {
  const el = document.getElementById('tabFavCnt');
  if (el) el.textContent = favs.size;
}

// ── 최근 검색 ───────────────────────────────
// ══════════════════════════════════════════════
const RECENT_KEY = 'tsla_recent';
function getRecents() { try { return JSON.parse(localStorage.getItem(RECENT_KEY)||'[]'); } catch(e){ return []; } }
function saveRecent(q) {
  if (!q || q.length < 1) return;
  let r = getRecents().filter(x => x !== q);
  r.unshift(q); r = r.slice(0,5);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(r)); } catch(e){}
}
function showRecentBox() {
  const inp = document.getElementById('searchInput');
  if (!inp || inp.value.trim()) { hideRecentBox(); return; }
  const recents = getRecents();
  if (!recents.length) { hideRecentBox(); return; }
  let box = document.getElementById('recentBox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'recentBox';
    box.className = 'recent-box';
    document.querySelector('.search-wrapper').appendChild(box);
  }
  box.innerHTML = `<div class="recent-label">최근 검색</div>
    <div class="recent-chips">
      ${recents.map(r=>`<span class="recent-chip">${r}</span>`).join('')}
      <span class="recent-clear">지우기</span>
    </div>`;
  box.querySelectorAll('.recent-chip').forEach(chip =>
    chip.addEventListener('click', () => { inp.value = chip.textContent; inp.dispatchEvent(new Event('input',{bubbles:true})); hideRecentBox(); })
  );
  box.querySelector('.recent-clear').addEventListener('click', () => { localStorage.removeItem(RECENT_KEY); hideRecentBox(); });
  box.style.display = '';
}
function hideRecentBox() {
  const box = document.getElementById('recentBox');
  if (box) box.style.display = 'none';
}

      { icon:'❄️', text:'겨울 드라이브 — 실내 데스티네이션 충전소에서 따뜻하게', cta:'데스티네이션 보기', filter:null, type:'dest' },
      { icon:'🎉', text:'연말연시 장거리 — 전국 슈퍼차저로 빠르게 이동하세요', cta:'슈퍼차저만 보기', filter:null, type:'sc' },
      { icon:'🏨', text:'겨울 온천·리조트 여행 — 호텔 데스티네이션 충전 총정리', cta:'충남·강원 보기', filter:['충남','강원'], type:null },
      { icon:'🌨️', text:'제주 겨울 여행 — 제주도 전체 충전소 지도 한눈에 보기', cta:'제주 보기', filter:['제주'], type:null },
    ],
  };

  const seasonKey = [3,4,5].includes(month) ? 'spring'
    : [6,7,8].includes(month) ? 'summer'
    : [9,10,11].includes(month) ? 'autumn'
    : 'winter';

  const banners = allBanners[seasonKey];
  const el = document.getElementById('seasonBanner');
  if (!el || !banners.length) return;

  let idx = 0;
  let autoTimer = null;

  function renderSlide(newIdx, direction) {
    idx = ((newIdx % banners.length) + banners.length) % banners.length;
    const b = banners[idx];
    const slide = document.getElementById('seasonSlide');

    // 슬라이드 전환 애니메이션
    slide.classList.remove('fade-in');
    void slide.offsetWidth; // reflow
    slide.classList.add('fade-in');

    document.getElementById('bannerIcon').textContent = b.icon;
    document.getElementById('bannerText').textContent = b.text;
    document.getElementById('bannerCta').textContent = b.cta;
    document.getElementById('bannerCount').textContent = `${idx+1}/${banners.length}`;

    // 배너 배경색 시즌별 변경
    const colors = { spring: ['#0c1a0c','#152015'], summer: ['#0a131a','#0d1820'], autumn: ['#1a0f06','#1e1208'], winter: ['#0a0e1a','#0e1220'] };
    const [bg1, bg2] = colors[seasonKey];
    const textColors = { spring:'#7aaa7a', summer:'#5a9aaa', autumn:'#aa8a5a', winter:'#7a8aaa' };
    const borderColors = { spring:'#152015', summer:'#0d1e28', autumn:'#2a1a08', winter:'#121830' };
    el.style.background = `linear-gradient(135deg, ${bg1} 0%, ${bg2} 100%)`;
    el.style.borderBottomColor = borderColors[seasonKey];
    document.getElementById('bannerText').style.color = textColors[seasonKey];
    document.getElementById('bannerCta').style.color = textColors[seasonKey];

    // 도트 업데이트
    const dots = document.getElementById('bannerDots');
    dots.innerHTML = banners.map((_,i) =>
      `<span class="banner-dot${i===idx?' active':''}" data-i="${i}"></span>`
    ).join('');
    dots.querySelectorAll('.banner-dot').forEach(d => {
      d.addEventListener('click', () => { resetTimer(); renderSlide(+d.dataset.i); });
    });
  }

  function nextSlide() { renderSlide(idx + 1); }
  function prevSlide() { renderSlide(idx - 1); }

  function resetTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(nextSlide, 8000);
  }

  // CTA 클릭: 필터 적용 후 다음 배너로 이동 (닫지 않음)
  document.getElementById('bannerCta').addEventListener('click', () => {
    const b = banners[idx];
    if (b.type === 'sc') {
      switchType('sc');
    } else if (b.type === 'dest') {
      switchType('dest');
    } else if (b.filter) {
      state.typeFilter = 'all';
      state.regions = new Set(b.filter);
      syncFilterBtns(); render();
      document.getElementById('tabAll').classList.add('active');
      document.getElementById('tabDest').classList.remove('active');
      document.getElementById('tabSc').classList.remove('active');
      document.getElementById('tabFav').classList.remove('active');
      buildRegionFilters();
    }
    document.querySelector('.table-wrap, #cardGridWrap')?.scrollIntoView({behavior:'smooth', block:'start'});
    resetTimer();
    nextSlide();
  });

  // 이전/다음 버튼
  document.getElementById('bannerNext').addEventListener('click', () => { resetTimer(); nextSlide(); });
  document.getElementById('bannerPrev').addEventListener('click', () => { resetTimer(); prevSlide(); });

  // 닫기 버튼: 오늘 하루 닫기
  document.getElementById('bannerClose').addEventListener('click', () => {
    el.style.display = 'none';
    clearInterval(autoTimer);
    localStorage.setItem('tsla_banner_closed', todayStr);
  });

  // 초기 렌더 + 자동 순환 시작
  el.style.display = '';
  renderSlide(0);
  autoTimer = setInterval(nextSlide, 8000);
}

function initRoutePlanner() {

    .map(r => `<option value="${r}">${r}</option>`).join('');
  document.getElementById('routeFrom').innerHTML = '<option value="">출발 지역 선택</option>' + opts;
  document.getElementById('routeTo').innerHTML   = '<option value="">도착 지역 선택</option>' + opts;
}
function toggleRoutePlanner() {
  const panel = document.getElementById('routePanel');
  const btn = document.getElementById('routeToggleBtn');
  const open = panel.style.display === 'none' || panel.style.display === '';
  panel.style.display = open ? '' : 'none';
  btn.classList.toggle('active', open);
  if (open) panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function doRoute() {
  const from = document.getElementById('routeFrom').value;
  const to   = document.getElementById('routeTo').value;
  if (!from && !to) return;
  const sel = new Set([from, to].filter(Boolean));

  document.getElementById('tabDest').classList.remove('active');
  document.getElementById('tabSc').classList.remove('active');
  document.getElementById('tabFav').classList.remove('active');
  buildRegionFilters(); syncFilterBtns(); render();
  const cnt = allStations.filter(s => sel.has(s.region)).length;
  document.getElementById('routeInfo').textContent = `${[...sel].join(' → ')} 충전소 ${cnt}개`;
  document.querySelector('.table-wrap')?.scrollIntoView({behavior:'smooth', block:'start'});
}
function resetRoute() {
  state.regions = new Set();
  syncFilterBtns(); buildRegionFilters(); render();
  document.getElementById('routeFrom').value = '';
  document.getElementById('routeTo').value   = '';
  document.getElementById('routeInfo').textContent = '';
}

// ─── 활성 데이터 ────────────────────────────────
function getActiveData() {
  if (state.typeFilter === 'fav')  return allStations.filter(s => favs.has(favKey(s)));
  if (state.typeFilter === 'dest') return allStations.filter(s => s.type === 'dest');
  if (state.typeFilter === 'sc')   return allStations.filter(s => s.type === 'sc');
  return allStations;
}
// ─── 헬퍼 ───────────────────────────────────────
function highlight(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function regionCount(r, data) {
  return data.filter(s => s.region === r).length;
}

// ─── 지역 필터 버튼 생성 ──────────────────────────
const regionOrder = ['전체','서울','경기','인천','부산','대구','대전','광주','울산','세종','강원','충북','충남','경북','경남','전북','전남','제주','기타'];

const filterGroup      = document.getElementById('filterGroup');
const mobRegionGrid    = document.getElementById('mobRegionGrid');
const mobRegionToggle  = document.getElementById('mobRegionToggle');
const mobRegionExpand  = document.getElementById('mobRegionExpand');
const mobRegionLabel   = document.getElementById('mobRegionLabel');
const mobRegionSection = document.getElementById('mobRegionSection');
const mobSelectedChips = document.getElementById('mobSelectedChips');

// ─── 모바일 선택 칩 업데이트 ─────────────────────
function updateMobChips() {
  const cnt = state.regions.size;
  mobRegionToggle.classList.toggle('has-sel', cnt > 0);
  // 버튼 레이블: 전체 or 선택한 지역명(1개) or N개 선택
  if (cnt === 0) {
    mobRegionLabel.textContent = '전체';
  } else if (cnt === 1) {
    mobRegionLabel.textContent = [...state.regions][0];
  } else {
    mobRegionLabel.textContent = cnt + '개 선택';
  }
  mobSelectedChips.innerHTML = [...state.regions].map(r =>
    `<span class="mob-chip" data-r="${r}">${r}<span class="mob-chip-x">×</span></span>`
  ).join('');
  mobSelectedChips.querySelectorAll('.mob-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.regions.delete(chip.dataset.r);
      syncFilterBtns(); render();
    });
  });
}

// ─── 필터 버튼 활성화 동기화 ───────────────────
function syncFilterBtns() {
  document.querySelectorAll('.filter-btn').forEach(b => {
    const r = b.dataset.region;
    b.classList.toggle('active',
      r === '전체' ? state.regions.size === 0 : state.regions.has(r));
  });
  updateMobChips();
}

// ─── 지역 버튼 클릭 공통 핸들러 ────────────────
function handleRegionClick(r) {
  if (r === '전체') {
    state.regions = new Set();
  } else {
    state.regions.has(r) ? state.regions.delete(r) : state.regions.add(r);
  }
  syncFilterBtns();
  render();
}

// ─── 필터 버튼 동적 생성 ─────────────────────────
function buildRegionFilters() {
  const data = getActiveData();
  const existingRegions = ['전체', ...new Set(data.map(s => s.region))];
  const orderedRegions = regionOrder.filter(r => existingRegions.includes(r));

  filterGroup.innerHTML = '';
  mobRegionGrid.innerHTML = '';

  orderedRegions.forEach(r => {
    const cnt = r === '전체' ? data.length : regionCount(r, data);
    const isActive = r === '전체' ? state.regions.size === 0 : state.regions.has(r);

    // 데스크톱 버튼
    const btnD = document.createElement('button');
    btnD.className = 'filter-btn' + (isActive ? ' active' : '');
    btnD.dataset.region = r;
    btnD.innerHTML = `${r} <span class="cnt">${cnt}</span>`;
    btnD.addEventListener('click', () => handleRegionClick(r));
    filterGroup.appendChild(btnD);

    // 모바일 버튼
    const btnM = document.createElement('button');
    btnM.className = 'filter-btn' + (isActive ? ' active' : '');
    btnM.dataset.region = r;
    btnM.innerHTML = `${r}<span class="cnt">${cnt}</span>`;
    btnM.addEventListener('click', () => handleRegionClick(r));
    mobRegionGrid.appendChild(btnM);
  });
}

buildRegionFilters();

// ─── 모바일 지역 토글 버튼 ──────────────────────
function closeMobRegion() {
  mobRegionExpand.classList.remove('open');
  mobRegionToggle.classList.remove('open');
}

mobRegionToggle.addEventListener('click', (e) => {

  const isOpen = mobRegionExpand.classList.toggle('open');

});

// 외부 클릭 시: 드롭다운 닫힘 + 클릭 흡수 (다른 액션 막음, 한번 더 눌러야 함)
document.addEventListener('click', (e) => {
  if (mobRegionExpand.classList.contains('open') && !mobRegionSection.contains(e.target)) {
    closeMobRegion();
    e.stopPropagation(); // 이 클릭이 다른 요소에 전달되지 않도록
  }
}, true); // 캡처 단계 — 대상 요소보다 먼저 실행
// 터치: touchend에서 preventDefault로 후속 click 이벤트 차단
document.addEventListener('touchend', (e) => {
  if (mobRegionExpand.classList.contains('open') && !mobRegionSection.contains(e.target)) {
    closeMobRegion();
    e.preventDefault(); // 후속 click 이벤트 발생 방지
  }
}, { passive: false, capture: true });

const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const acBox = document.getElementById('acBox');

searchInput.addEventListener('input', () => {
  state.query = searchInput.value;
  clearBtn.style.display = state.query ? 'flex' : 'none';
  updateAutocomplete();
  render();
  clearTimeout(searchInput._recentTimer);
  if (state.query.trim()) {
    searchInput._recentTimer = setTimeout(() => saveRecent(state.query.trim()), 1000);
    hideRecentBox();
  } else {
    showRecentBox();
  }
});

searchInput.addEventListener('keydown', e => {
  const items = acBox.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.acFocusIdx = Math.min(state.acFocusIdx + 1, items.length - 1);
    updateAcFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    state.acFocusIdx = Math.max(state.acFocusIdx - 1, -1);
    updateAcFocus(items);
  } else if (e.key === 'Enter') {
    if (state.acFocusIdx >= 0 && items[state.acFocusIdx]) {
      items[state.acFocusIdx].click();
    } else {
      closeAc();
    }
  } else if (e.key === 'Escape') {
    closeAc();
    searchInput.blur();
  }
});

searchInput.addEventListener('focus', () => { updateAutocomplete(); if (!state.query.trim()) showRecentBox(); });
searchInput.addEventListener('blur', () => setTimeout(() => { closeAc(); hideRecentBox(); }, 180));

function updateAcFocus(items) {
  items.forEach((item, i) => item.classList.toggle('focused', i === state.acFocusIdx));
}

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  state.query = '';
  clearBtn.style.display = 'none';
  closeAc();
  searchInput.focus();
  render();
});

// / 키 포커스
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});

// ─── 자동완성 ────────────────────────────────────
function updateAutocomplete() {
  const q = state.query.trim().toLowerCase();
  state.acFocusIdx = -1;
  if (!q) { closeAc(); return; }

  const matched = getActiveData().filter(s =>
    s.name.toLowerCase().includes(q) || s.address.toLowerCase().includes(q)
  ).slice(0, 7);

  if (!matched.length) { closeAc(); return; }

  acBox.innerHTML = '<div class="ac-section-header">충전소 검색결과</div>' +
    matched.map((s, i) => `
      <div class="ac-item" data-idx="${i}" data-name="${s.name}" data-region="${s.region}">
        <span class="ac-icon">⚡</span>
        <div>
          <div>${highlight(s.name, q)}</div>
          <div style="font-size:11px;color:#555;margin-top:2px">${highlight(s.address, q)}</div>
        </div>
        <span class="ac-region">${s.region}</span>
      </div>
    `).join('');

  acBox.querySelectorAll('.ac-item').forEach(item => {
    item.addEventListener('mousedown', () => {
      const name = item.dataset.name;
      if(typeof trackEvt==='function') trackEvt('ac_select', name);
      searchInput.value = name;
      state.query = name;
      state.regions = new Set();
      syncFilterBtns();
      clearBtn.style.display = 'flex';
      closeAc();
      render();
    });
  });

  acBox.style.display = 'block';
}

function closeAc() {
  acBox.style.display = 'none';
  state.acFocusIdx = -1;
}

// ─── 정렬 함수 ───────────────────────────────────
function getSorted(list) {
  const copy = [...list];
  if (state.sort === 'name-asc') return copy.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
  if (state.sort === 'name-desc') return copy.sort((a,b) => b.name.localeCompare(a.name, 'ko'));
  if (state.sort === 'region') return copy.sort((a,b) => a.region.localeCompare(b.region, 'ko') || a.name.localeCompare(b.name, 'ko'));
  if (state.sort === 'stalls-desc') return copy.sort((a,b) => (b.stalls ?? -1) - (a.stalls ?? -1));
  if (state.sort === 'stalls-asc') return copy.sort((a,b) => (a.stalls ?? 9999) - (b.stalls ?? 9999));
  if (state.sort === 'price-asc') return copy.sort((a,b) => (a.teslaPrice ?? 9999) - (b.teslaPrice ?? 9999));
  if (state.sort === 'price-desc') return copy.sort((a,b) => (b.teslaPrice ?? -1) - (a.teslaPrice ?? -1));
  return copy; // default
}

// ─── 유형 필터 전환 ──────────────────────────────
function switchType(type) {
  if(typeof trackEvt==='function') trackEvt('tab', type);
  state.typeFilter = type;
  state.regions = new Set();

  document.getElementById('tabAll').classList.toggle('active', type === 'all');
  document.getElementById('tabDest').classList.toggle('active', type === 'dest');
  document.getElementById('tabSc').classList.toggle('active', type === 'sc');
  document.getElementById('tabFav').classList.toggle('active', type === 'fav');

  buildRegionFilters();
  syncFilterBtns();
  render();
}

  }));

// ── 주소 복사 ─────────────────────────────────────
function copyAddress(addr) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(addr).then(() => showToast('📋 주소 복사됨')).catch(() => fallbackCopy(addr));
  } else {
    fallbackCopy(addr);
  }
}
function fallbackCopy(addr) {
  const el = document.createElement('textarea');
  el.value = addr; el.style.position = 'fixed'; el.style.opacity = '0';
  document.body.appendChild(el); el.select();
  try { document.execCommand('copy'); showToast('📋 주소 복사됨'); } catch(e) {}
  document.body.removeChild(el);
}

// ── kW 클래스 헬퍼 ───────────────────────────────
function getKwClass(kw) {
  if (!kw || kw <= 0) return 'slow';
  if (kw >= 100) return 'fast';
  if (kw >= 22) return 'mid';
  return 'slow';
}

// ─── TOP 5 인기 충전소 (Firebase 기반) ────────────
// ═══════════════════════════════════════════════════
(function(){
  const TOP5_DB = 'https://tesla-charger-analytics-default-rtdb.firebaseio.com';
  const CACHE_KEY = 'tsla_top5v2';
  const CACHE_TTL = 1 * 60 * 1000;

  // KST 기준 오늘 날짜 (UTC+9)
  function getKSTToday() {
    return new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10);
  }

  function countEvents(hitsObj, type, filterFn) {
    const map = {};
    Object.values(hitsObj).forEach(h => {
      if (!filterFn(h)) return;
      (h.events || []).forEach(e => {
        const isSearch  = type === 'search'  && e.type === 'search';
        const isStation = type === 'station' && (e.type === 'map_naver' || e.type === 'map_kakao');
        const isRegion  = type === 'region'  && (e.type === 'filter' || e.type === 'badge_region');
        if ((isSearch || isStation || isRegion) && e.detail) map[e.detail] = (map[e.detail]||0)+1;
      });
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  }

  function fillSearch(kw) {
    const inp = document.getElementById('searchInput');
    if (!inp) return;
    inp.value = kw;
    inp.dispatchEvent(new Event('input', {bubbles:true}));
    inp.focus();
    document.querySelector('.controls')?.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function fillRegion(region) {
    // 지역 배지 클릭 시뮬레이션
    const badges = document.querySelectorAll('#filterGroup .region-badge, #mobRegionGrid .region-badge');
    for (const b of badges) {
      if (b.textContent.trim() === region) { b.click(); break; }
    }
    document.querySelector('.controls')?.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function renderList(id, data, onClickFn) {
    const el = document.getElementById(id);
    if (!el) return;
    if (!data || !data.length) {
      el.innerHTML = '<div class="top5-empty">오늘 데이터가 없습니다</div>';
      return;
    }
    const max = data[0][1];
    el.innerHTML = data.map(([name, cnt], i) => `
      <div class="top5-item${onClickFn?' clickable':''}" data-kw="${name.replace(/"/g,'&quot;')}">
        <div class="top5-rank r${i+1}">${['🥇','🥈','🥉'][i]||i+1}</div>
        <div class="top5-name" title="${name}">${name}</div>
        <div class="top5-bar-wrap"><div class="top5-bar" style="width:${Math.round(cnt/max*100)}%"></div></div>
        <div class="top5-count" style="display:none">${cnt}</div>
      </div>`).join('');
    if (onClickFn) {
      el.querySelectorAll('.top5-item.clickable').forEach(item =>
        item.addEventListener('click', () => onClickFn(item.dataset.kw))
      );
    }
  }

  function showData(d) {
    document.getElementById('top5Section').style.display = '';
    renderList('top5StationToday', d.stT, fillSearch);
    renderList('top5RegionToday',  d.rT,  fillRegion);
    renderList('top5SearchToday',  d.sT,  fillSearch);
    const el = document.getElementById('top5UpdatedTime');
    if (el) {
      const t = new Date(d.ts + 9*3600*1000);
      el.textContent = `갱신 ${t.getUTCHours().toString().padStart(2,'0')}:${t.getUTCMinutes().toString().padStart(2,'0')} KST`;
    }
  }

  async function load(force) {
    if (!force) {
      try {
        const c = JSON.parse(sessionStorage.getItem(CACHE_KEY));
        if (c && Date.now() - c.ts < CACHE_TTL) { showData(c); return; }
      } catch(e) {}
    }
    const btn = document.getElementById('top5RefreshBtn');
    if (btn) btn.classList.add('spinning');
    try {
      const res = await fetch(`${TOP5_DB}/hits.json?orderBy=%22%24key%22&limitToLast=600`);
      if (!res.ok) throw 0;
      const hits = await res.json();
      if (!hits) throw 0;

      const todayKST = getKSTToday();
      const isToday  = h => !!h.tsUnix && new Date(h.tsUnix + 9*3600*1000).toISOString().slice(0,10) === todayKST;

      const d = {
        stT: countEvents(hits, 'station', isToday),
        rT:  countEvents(hits, 'region',  isToday),
        sT:  countEvents(hits, 'search',  isToday),
        ts: Date.now()
      };
      try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch(e){}
      showData(d);
    } catch(e) {
      document.getElementById('top5Section').style.display = 'none';
    } finally {
      if (btn) btn.classList.remove('spinning');
    }
  }

  document.getElementById('top5RefreshBtn')?.addEventListener('click', () => load(true));
  load();
  setInterval(() => load(true), CACHE_TTL);
})();

    try {
      const c = sessionStorage.getItem('tsla_tok');
      if (c) { const p = JSON.parse(c); if (p.exp > Date.now()) return p.tok; }
      const r = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FB_KEY}`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({returnSecureToken: true})
      });
      const d = await r.json();
      if (d.idToken) {
        sessionStorage.setItem('tsla_tok', JSON.stringify({tok: d.idToken, exp: Date.now() + 55*60*1000}));
        return d.idToken;
      }
    } catch(e) {}
    return null;
  }

  function getVid() {
    let v = localStorage.getItem('tsla_vid');
    if (!v) { v = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('tsla_vid', v); }
    return v;
  }
  // 세션 ID: 30분 무활동 시 갱신 (재방문 vs 연속 세션 구분)
  function getSid() {
    const now = Date.now();
    const sid = sessionStorage.getItem('tsla_sid');
    const ts = parseInt(sessionStorage.getItem('tsla_sid_ts') || '0');
    if (!sid || (now - ts) > 30 * 60 * 1000) {
      const n = 's_' + now + '_' + Math.random().toString(36).slice(2,6);
      sessionStorage.setItem('tsla_sid', n);
      sessionStorage.setItem('tsla_sid_ts', now);
      return n;
    }
    sessionStorage.setItem('tsla_sid_ts', now);
    return sid;
  }
  function getDevice() {
    const ua = navigator.userAgent;
    if (/Mobi|Android/i.test(ua)) return 'mobile';
    if (/Tablet|iPad/i.test(ua)) return 'tablet';
    return 'desktop';
  }
  function getBrowser() {
    const ua = navigator.userAgent;
    if (ua.includes('Edg/')) return 'Edge';
    if (ua.includes('Chrome')) return 'Chrome';
    if (ua.includes('Firefox')) return 'Firefox';
    if (ua.includes('Safari')) return 'Safari';
    return 'Other';
  }
  function getOS() {
    const ua = navigator.userAgent;
    if (ua.includes('Windows')) return 'Windows';
    if (ua.includes('Mac OS')) return 'macOS';
    if (ua.includes('Android')) return 'Android';
    if (/iPhone|iPad/.test(ua)) return 'iOS';
    if (ua.includes('Linux')) return 'Linux';
    return 'Other';
  }
  function getUTM(k) { return new URLSearchParams(location.search).get(k) || ''; }

  // 페이지 로드 시점에 고정값 미리 캡처
  const vid = getVid();
  const sid = getSid();
  const device = getDevice();
  const browser = getBrowser();
  const os = getOS();
  const ref = document.referrer || 'direct';
  const T0 = Date.now();

  const interactions = [];
  function trackEvt(type, detail) {
    interactions.push({ t: Date.now(), type, detail });
    sessionStorage.setItem('tsla_sid_ts', Date.now()); // 활동마다 세션 연장
  }

  const si = document.getElementById('searchInput');
  let _sd;
  if (si) si.addEventListener('input', function() {
    clearTimeout(_sd);
    _sd = setTimeout(() => { if (this.value.trim()) trackEvt('search', this.value.trim()); }, 1000);
  });
  document.addEventListener('click', function(e) {
    const fb = e.target.closest('.filter-btn');
    if (fb) trackEvt('filter', fb.dataset.region || fb.textContent.trim());
    const mb = e.target.closest('.map-btn');
    if (mb) {
      const n = mb.closest('tr')?.querySelector('.name')?.textContent || '';
      trackEvt(mb.classList.contains('naver') ? 'map_naver' : 'map_kakao', n);
    }
    const sb = e.target.closest('.sort-btn');
    if (sb) trackEvt('sort', sb.dataset.sort);
    // 전화 클릭
    const pl = e.target.closest('.phone-link');
    if (pl) trackEvt('phone_call', pl.textContent.trim());
    // Tesla 공식 링크
    const tl = e.target.closest('a.name');
    if (tl && tl.href?.includes('tesla.com')) trackEvt('tesla_link', tl.textContent.trim());
    // 지역 배지 클릭
    const rb = e.target.closest('.region-badge');
    if (rb) trackEvt('badge_region', rb.textContent.trim());
    // 테이블 헤더 정렬
    const th = e.target.closest('th[data-col]');
    if (th) trackEvt('th_sort', th.dataset.col);
    // 즐겨찾기 토글
    const fvb = e.target.closest('.fav-btn[data-fk]');
    if (fvb) {
      const wasActive = fvb.classList.contains('active');
      trackEvt(wasActive ? 'fav_remove' : 'fav_add', fvb.dataset.name || '');
    }
    // 즐겨찾기 탭
    const favTab = e.target.closest('#tabFav');
    if (favTab) trackEvt('fav_tab_view', '');
    // 최근 검색어 칩 클릭
    const rc = e.target.closest('.recent-chip');
    if (rc) trackEvt('recent_search', rc.textContent.replace('✕','').trim());
    // 루트 플래너 사용
    const rg = e.target.closest('.route-go');
    if (rg) {
      const from = document.getElementById('routeFrom')?.value || '';
      const to = document.getElementById('routeTo')?.value || '';
      trackEvt('route_planner_use', from + '→' + to);
    }
    // 시즌 배너 CTA 클릭
    const sc = e.target.closest('#bannerCta');
    if (sc) trackEvt('season_banner_cta', sc.textContent.trim());
    // 시즌 배너 이전/다음
    const sn = e.target.closest('#bannerNext, #bannerPrev');
    if (sn) trackEvt('season_banner_nav', sn.id === 'bannerNext' ? 'next' : 'prev');
    // 시즌 배너 닫기
    const sx = e.target.closest('#bannerClose');
    if (sx) trackEvt('season_banner_close', '');
    // 카드 뷰 전환
    const gv = e.target.closest('#viewGridBtn');
    if (gv) trackEvt('view_card', '');
  });

  // 스크롤 깊이 추적
  let _maxScroll = 0, _scrollMarks = {};
  window.addEventListener('scroll', function() {
    const h = document.documentElement, b = document.body;
    const pct = Math.round((h.scrollTop || b.scrollTop) / ((h.scrollHeight || b.scrollHeight) - h.clientHeight) * 100) || 0;
    if (pct > _maxScroll) _maxScroll = pct;
    [25,50,75,100].forEach(m => { if (pct >= m && !_scrollMarks[m]) { _scrollMarks[m] = true; trackEvt('scroll_depth', m); } });
  }, {passive:true});

  // 검색 결과 수 (render()에서 갱신)
  let _lastResultCnt = null;

  // geo 데이터 세션 캐시 (같은 세션 내 중복 호출 방지)
  let geoCache = null;
  async function fetchGeo() {
    if (geoCache) return geoCache;
    const cached = sessionStorage.getItem('tsla_geo');
    if (cached) { try { geoCache = JSON.parse(cached); return geoCache; } catch(e){} }
    try {
      const r = await fetch('https://ipapi.co/json/');
      if (r.ok) {
        const g = await r.json();
        geoCache = { country_name: g.country_name||'', cc: g.country_code||'', region: g.region||'', city: g.city||'', org: g.org||'' };
        sessionStorage.setItem('tsla_geo', JSON.stringify(geoCache));
      }
    } catch(e) {}
    return geoCache || {};
  }

  async function sendHit(final) {
    if (DB_URL.includes('HERE')) return;
    const [geo, tok] = await Promise.all([fetchGeo(), getAuthToken()]);
    const d = {
      vid, sid,
      ts: new Date().toISOString(), tsUnix: Date.now(),
      ref, device, browser, os, lang: navigator.language,
      scrW: screen.width, scrH: screen.height, winW: innerWidth, winH: innerHeight,
      isReturn: !!localStorage.getItem('tsla_ret'),
      utmS: getUTM('utm_source'), utmM: getUTM('utm_medium'), utmC: getUTM('utm_campaign'),
      country: geo.country_name||'', cc: geo.cc||'',
      region: geo.region||'', city: geo.city||'', org: geo.org||'',
      dur: Math.round((Date.now()-T0)/1000),
      events: final ? interactions : [], evtCnt: interactions.length, final: !!final,
      firstActMs: interactions.length ? interactions[0].t - T0 : null,
      bounce: final && interactions.length === 0,
      maxScroll: _maxScroll,
      resultCnt: _lastResultCnt
    };
    localStorage.setItem('tsla_ret', '1');
    const url = tok ? `${DB_URL}/hits.json?auth=${tok}` : `${DB_URL}/hits.json`;
    try { await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); } catch(e){}
  }

  // geo + 인증 토큰 미리 fetch 후 2.5초 뒤 초기 hit 전송
  Promise.all([fetchGeo(), getAuthToken()]).then(() => setTimeout(() => sendHit(false), 2500));

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden' && !DB_URL.includes('HERE')) {
      const geo = geoCache || {};
      const tokCache = sessionStorage.getItem('tsla_tok');
      let tok = null;
      try { const p = JSON.parse(tokCache); if (p?.exp > Date.now()) tok = p.tok; } catch(e) {}
      const url = tok ? `${DB_URL}/hits.json?auth=${tok}` : `${DB_URL}/hits.json`;
      navigator.sendBeacon(url, JSON.stringify({
        vid, sid,
        ts: new Date().toISOString(), tsUnix: Date.now(),
        ref, device, browser, os,
        country: geo.country_name||'', cc: geo.cc||'',
        region: geo.region||'', city: geo.city||'', org: geo.org||'',
        dur: Math.round((Date.now()-T0)/1000),
        events: interactions, evtCnt: interactions.length, final: true,
        firstActMs: interactions.length ? interactions[0].t - T0 : null,
        bounce: interactions.length === 0,
        maxScroll: _maxScroll,
        resultCnt: _lastResultCnt
      }));
    }
  });
})();
</script>
</body>
</html>
